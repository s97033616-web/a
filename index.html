<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Battle</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:rgb(0, 0, 0);
}
canvas{
    display:block;
}
</style>

</head>

<body>

<canvas id="game"></canvas>

<script>

    function isMobile() {
    return (
        'ontouchstart' in window ||
        navigator.maxTouchPoints > 0 ||
        navigator.msMaxTouchPoints > 0
    );
}

if (isMobile()) {
    createMobileControls();
}

function createMobileControls(){

    const size = 90;
    const gap = 10;

    const baseX = 20;
    const baseY = 20;

    function makeBtn(symbol, key, x, y){

        const btn = document.createElement("div");

        btn.innerHTML = symbol;

        btn.style.position = "fixed";
        btn.style.left = x + "px";
        btn.style.bottom = y + "px";

        btn.style.width = size + "px";
        btn.style.height = size + "px";

        btn.style.background = "rgba(255,255,255,0.25)";
        btn.style.borderRadius = "50%";

        btn.style.display = "flex";
        btn.style.alignItems = "center";
        btn.style.justifyContent = "center";

        btn.style.fontSize = "40px";
        btn.style.color = "white";

        btn.style.zIndex = "9999";
        btn.style.userSelect = "none";

        btn.addEventListener("touchstart", e=>{
            e.preventDefault();
            document.dispatchEvent(new KeyboardEvent("keydown",{key:key}));
        });

        btn.addEventListener("touchend", e=>{
            e.preventDefault();
            document.dispatchEvent(new KeyboardEvent("keyup",{key:key}));
        });

        document.body.appendChild(btn);
    }

    makeBtn("↑","ArrowUp", baseX + size + gap, baseY + size*2 + gap*2);
    makeBtn("←","ArrowLeft", baseX, baseY + size + gap);
    makeBtn("→","ArrowRight", baseX + size*2 + gap*2, baseY + size + gap);
    makeBtn("↓","ArrowDown", baseX + size + gap, baseY);

}

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resizeGame() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

window.addEventListener("resize", resizeGame);
resizeGame();

let gameState = "menu";

const playerImg = new Image();
playerImg.src = "images/ghost.png";

const enemyImg = new Image();
enemyImg.src = "images/ghost.png";

let player = {
    x: 100,
    y: 300,
    size: 60,
    vx: 0,
    vy: 0,
    accel: 0.5,
    friction: 0.9,
    maxSpeed: 8,
    hp: 4,
    lastAttack: 0
};

let enemy = {
    x: 800,
    y: 300,
    size: 60,
    hp: 4,
    speed: 2,
    lastAttack: 0
};

let playButton = {
    width: 200,
    height: 80,
    x: 0,
    y: 0
};

let keys = {};
let messages = [];
let winner = "";

document.addEventListener("keydown", e => {
    keys[e.key] = true;
});

document.addEventListener("keyup", e => {
    keys[e.key] = false;
});

canvas.addEventListener("click", e => {
    if (gameState === "menu") {
        let rect = canvas.getBoundingClientRect();
        let mx = e.clientX - rect.left;
        let my = e.clientY - rect.top;

        if (
            mx > playButton.x &&
            mx < playButton.x + playButton.width &&
            my > playButton.y &&
            my < playButton.y + playButton.height
        ) {
            startBattle();
        }
    }
});

function startBattle() {
    gameState = "battle";
    winner = "";

    player.x = canvas.width * 0.25;
    player.y = canvas.height / 2;

    enemy.x = canvas.width * 0.75;
    enemy.y = canvas.height / 2;

    player.hp = 4;
    enemy.hp = 4;

    player.vx = 0;
    player.vy = 0;
}

function returnToMenu() {
    gameState = "menu";
    messages = [];
}

function addMessage(text, x, y) {
    messages.push({
        text: text,
        x: x,
        y: y,
        time: Date.now()
    });
}

function updateBattle() {

    if (winner !== "") return;

    let ax = 0;
    let ay = 0;

    if (keys["ArrowLeft"]) ax -= 1;
    if (keys["ArrowRight"]) ax += 1;
    if (keys["ArrowUp"]) ay -= 1;
    if (keys["ArrowDown"]) ay += 1;

    let len = Math.sqrt(ax * ax + ay * ay);

    if (len > 0) {
        ax /= len;
        ay /= len;
    }

    player.vx += ax * player.accel;
    player.vy += ay * player.accel;

    player.x += player.vx;
    player.y += player.vy;

    player.vx *= player.friction;
    player.vy *= player.friction;

    if (player.x < 0) player.x = 0;
    if (player.y < 0) player.y = 0;

    if (player.x + player.size > canvas.width)
        player.x = canvas.width - player.size;

    if (player.y + player.size > canvas.height)
        player.y = canvas.height - player.size;

    let dx = player.x - enemy.x;
    let dy = player.y - enemy.y;
    let dist = Math.sqrt(dx * dx + dy * dy);

    if (dist > 0) {
        enemy.x += (dx / dist) * enemy.speed;
        enemy.y += (dy / dist) * enemy.speed;
    }

    let cx = (player.x + player.size/2) - (enemy.x + enemy.size/2);
    let cy = (player.y + player.size/2) - (enemy.y + enemy.size/2);

    let distance = Math.sqrt(cx*cx + cy*cy);
    let minDist = player.size;

    if (distance < minDist) {

        let overlap = minDist - distance;
        let nx = cx / distance;
        let ny = cy / distance;

        player.x += nx * overlap/2;
        player.y += ny * overlap/2;

        enemy.x -= nx * overlap/2;
        enemy.y -= ny * overlap/2;
    }

    let now = Date.now();

    if (distance < player.size) {

        if (now - player.lastAttack > 500) {

            player.lastAttack = now;

            if (Math.random() > 0.75) {
                enemy.hp--;
                addMessage("HIT!", enemy.x, enemy.y);
            }
            else {
                addMessage("RESIST", enemy.x, enemy.y);
            }
        }

        if (now - enemy.lastAttack > 500) {

            enemy.lastAttack = now;

            if (Math.random() > 0.75) {
                player.hp--;
                addMessage("HIT!", player.x, player.y);
            }
            else {
                addMessage("RESIST", player.x, player.y);
            }
        }
    }

    messages = messages.filter(m => Date.now() - m.time < 700);

    if (player.hp <= 0 || enemy.hp <= 0) {

        if (winner === "") {

            winner = (player.hp <= 0) ? "ENEMY WINS!" : "PLAYER WINS!";

            setTimeout(() => {
                returnToMenu();
            }, 1000);
        }
    }
}

function drawHPBar(x,y,hp){

    const width = 60;
    const height = 8;

    ctx.fillStyle="gray";
    ctx.fillRect(x,y,width,height);

    ctx.fillStyle="lime";
    ctx.fillRect(x,y,width*(hp/4),height);
}

function drawMenu(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    player.x = canvas.width*0.2;
    player.y = canvas.height/2;

    enemy.x = canvas.width*0.8;
    enemy.y = canvas.height/2;

    ctx.drawImage(playerImg, player.x, player.y, player.size, player.size);
    ctx.drawImage(enemyImg, enemy.x, enemy.y, enemy.size, enemy.size);

    playButton.x = canvas.width/2 - playButton.width/2;
    playButton.y = canvas.height/2 - playButton.height/2;

    ctx.fillStyle="white";
    ctx.fillRect(playButton.x, playButton.y, playButton.width, playButton.height);

    ctx.fillStyle="black";
    ctx.font="40px Arial";
    ctx.textAlign="center";
    ctx.fillText("PLAY", canvas.width/2, canvas.height/2+15);
}

function drawBattle(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.drawImage(playerImg, player.x, player.y, player.size, player.size);
    ctx.drawImage(enemyImg, enemy.x, enemy.y, enemy.size, enemy.size);

    drawHPBar(player.x,player.y-15,player.hp);
    drawHPBar(enemy.x,enemy.y-15,enemy.hp);

    ctx.fillStyle="white";
    ctx.font="18px Arial";
    ctx.textAlign="left";

    messages.forEach(m=>{
        ctx.fillText(m.text,m.x,m.y);
    });

    if(winner!==""){

        ctx.fillStyle="yellow";
        ctx.font="bold 60px Arial";
        ctx.textAlign="center";

        ctx.fillText(winner,canvas.width/2,canvas.height/2);

        ctx.textAlign="left";
    }

    ctx.strokeStyle="white";
    ctx.lineWidth=4;
    ctx.strokeRect(0,0,canvas.width,canvas.height);
}

function gameLoop(){

    if(gameState==="menu"){
        drawMenu();
    }

    if(gameState==="battle"){
        updateBattle();
        drawBattle();
    }

    requestAnimationFrame(gameLoop);
}

gameLoop();

</script>

</body>
</html>
